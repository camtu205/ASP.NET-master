<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ctus Spa - Hệ thống Quản trị</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app">
        <!-- Auth Overlay -->
        <div id="auth-overlay" class="overlay hidden">
            <div class="auth-card glass">
                <div class="auth-tabs">
                    <button class="active" id="tab-login">Đăng nhập</button>
                    <button id="tab-register">Đăng ký</button>
                </div>
                <form id="auth-form">
                    <div class="input-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" id="username" required placeholder="admin">
                    </div>
                    <div class="input-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <div class="input-group hidden" id="group-role">
                        <label>Vai trò</label>
                        <select id="role">
                            <option value="Admin">Quản trị viên (Admin)</option>
                            <option value="Staff" selected>Nhân viên (Staff)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" id="auth-submit">Bắt đầu ngay</button>
                </form>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar glass" id="main-sidebar">
            <div class="logo">
                <i class="fas fa-spa"></i>
                <span>Ctus Spa</span>
            </div>
            <nav>
                <a href="#" class="nav-item active" data-section="dashboard">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-section="customers">
                    <i class="fas fa-users"></i> Khách hàng
                </a>
                <a href="#" class="nav-item" data-section="staffs">
                     <i class="fas fa-user-tie"></i> Nhân viên
                </a>
                <a href="#" class="nav-item" data-section="services">
                    <i class="fas fa-spa"></i> Dịch vụ
                </a>
                <a href="#" class="nav-item" data-section="products">
                    <i class="fas fa-box"></i> Sản phẩm
                </a>
                <a href="#" class="nav-item" data-section="appointments">
                    <i class="fas fa-calendar-check"></i> Đặt lịch hẹn
                </a>
                <a href="#" class="nav-item" data-section="checkout">
                    <i class="fas fa-shopping-cart"></i> Thanh toán
                </a>
                <a href="#" class="nav-item" data-section="promotions">
                    <i class="fas fa-percentage"></i> Khuyến mãi
                </a>
                <a href="#" class="nav-item" data-section="treatments">
                    <i class="fas fa-hand-holding-heart"></i> Danh mục liệu trình
                </a>
                <a href="#" class="nav-item" data-section="customerTreatments">
                    <i class="fas fa-file-medical"></i> Liệu trình của khách
                </a>
                <div style="margin: 10px 15px; border-top: 1px solid #e2e8f0; padding-top: 10px; font-size: 11px; color: #64748b; font-weight: bold; text-transform: uppercase;">Cơ sở vật chất</div>
                <a href="#" class="nav-item" data-section="roomTypes">
                    <i class="fas fa-building"></i> Loại phòng
                </a>
                <a href="#" class="nav-item" data-section="rooms">
                    <i class="fas fa-door-open"></i> Quản lý Phòng
                </a>
                <a href="#" class="nav-item" data-section="beds">
                    <i class="fas fa-bed"></i> Quản lý Giường
                </a>
                <a href="#" class="nav-item" data-section="audit">
                    <i class="fas fa-history"></i> Nhật ký hệ thống
                </a>
                <a href="#" class="nav-item" data-section="reviews">
                    <i class="fas fa-star"></i> Đánh giá
                </a>
            </nav>
            <div class="user-info">
                <div class="avatar" id="user-avatar">AD</div>
                <div class="info">
                    <span id="display-name">Admin</span>
                    <small id="display-role">Administrator</small>
                </div>
                <button id="logout-btn" title="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header>
                <h1 id="section-title">Tổng quan hệ thống</h1>
                <div class="header-actions">
                    <button class="btn-icon" id="btn-notifications" style="position:relative">
                        <i class="fas fa-bell"></i>
                        <span id="notif-badge" class="hidden" style="position:absolute; top:5px; right:5px; background:var(--error); color:white; font-size:10px; padding:2px 5px; border-radius:10px; min-width:18px">0</span>
                    </button>
                    <button class="btn-icon"><i class="fas fa-cog"></i></button>
                </div>
            </header>

            <div id="section-container">
                <!-- Sections will be injected here by app.js -->
            </div>
        </main>
        <!-- Edit Modal -->
        <div id="edit-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Chỉnh sửa</h2>
                    <button id="close-modal" class="close-modal"><i class="fas fa-times"></i></button>
                </div>
                <form id="edit-form">
                    <div id="modal-fields">
                        <!-- Fields injected by JS -->
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 24px; height: 50px; font-size: 1rem;">
                        <i class="fas fa-save"></i> Lưu thay đổi
                    </button>
                </form>
            </div>
        </div>

    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <i id="toast-icon" class="fas fa-info-circle"></i>
        <span id="toast-message">Thông báo</span>
    </div>

    <script src="js/app.js?v=1713865321"></script>
</body>
</html>
